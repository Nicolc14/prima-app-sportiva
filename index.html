<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>SportApp</title>

<!-- Font moderno -->
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

<style>
body { font-family: 'Roboto', sans-serif; max-width: 600px; margin: auto; background-color: #f0f2f5; }

/* Header con logo */
header {
display: flex;
align-items: center;
justify-content: space-between;
background-color: #1e90ff;
color: white;
padding: 10px 20px;
border-radius: 10px 10px 0 0;
}

/* Stile post */
.post {
border: 1px solid #ccc;
border-radius: 10px;
box-shadow: 0 2px 5px rgba(0,0,0,0.1);
padding: 15px;
margin: 15px 0;
background-color: #fafafa;
}

/* Cuore cliccabile */
.like { color: red; cursor: pointer; }
</style>
</head>
<body>

<!-- Header -->
<header>
<h2>SportApp</h2>
<img src="https://via.placeholder.com/40" alt="Logo">
</header>

<!-- Feed finto -->
<div class="post">
<p><strong>Mario</strong> ha corso 5 km oggi 🏃‍♂️</p>
<img src="https://via.placeholder.com/500x200?text=Corsa" alt="Corsa">
<span class="like">❤️ Like</span>
</div>

<div class="post">
<p><strong>Luca</strong> ha fatto 50 flessioni 💪</p>
<img src="https://via.placeholder.com/500x200?text=Flessioni" alt="Flessioni">
<span class="like">❤️ Like</span>
</div>

<div class="post">
<p><strong>Anna</strong> ha fatto 10 km in bici 🚴‍♀️</p>
<img src="https://via.placeholder.com/500x200?text=Bici" alt="Bici">
<span class="like">❤️ Like</span>
</div>

<!-- JavaScript cuore cliccabile -->
<script>
const hearts = document.querySelectorAll('.like');
hearts.forEach(h => {
h.addEventListener('click', () => {
if (h.style.color === 'red') h.style.color = 'gray';
else h.style.color = 'red';
});
});
</script>

</body>
</html>
