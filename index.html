<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>SportConnect</title>
  <style>
    body { font-family: Arial; margin: 0; background: #f2f2f2; }
    .navbar { background: #000; color: #fff; padding: 15px; text-align: center; }
    .post { background: #fff; margin: 20px; border-radius: 10px; padding: 10px; }
    .post img, .post video { width: 100%; border-radius: 10px; }
    .like-btn { color: #777; cursor: pointer; }
    .liked { color: red; }
    .upload-box { padding: 20px; background: #fff; margin: 20px; border-radius: 10px; }
  </style>
</head>
<body>
<div class="navbar">SportConnect</div>
<!-- Area per caricare post -->
<div class="upload-box">
  <h3>Pubblica attività sportiva</h3>
  <input type="file" id="mediaInput" accept="image/*,video/*">
  <textarea id="caption" placeholder="Descrivi la tua attività sportiva..." style="width:100%;height:60px;"></textarea>
  <button onclick="uploadPost()">Pubblica</button>
</div>
<!-- Feed -->
<div id="feed"></div>
<script>
// Salva post in locale
let posts = [];
// Pubblica post
function uploadPost() {
  const file = document.getElementById('mediaInput').files[0];
  const caption = document.getElementById('caption').value;
  if (!file) return alert("Carica una foto o un video");
  const url = URL.createObjectURL(file);
  const post = {
    id: Date.now(),
    caption: caption,
    mediaUrl: url,
    type: file.type.startsWith("video") ? "video" : "image",
    likes: 0
  };
  posts.unshift(post);
  renderFeed();
}
// Visualizza feed
function renderFeed() {
  const feed = document.getElementById('feed');
  feed.innerHTML = '';
  posts.forEach(p => {
    const el = document.createElement('div');
    el.className = 'post';
    el.innerHTML = `
      ${p.type === "image" ? `<img src="${p.mediaUrl}">` : `<video src="${p.mediaUrl}" controls>`}
      <p>${p.caption}</p>
      <span class="like-btn" onclick="likePost(${p.id}, this)">❤ ${p.likes}</span>
    `;
    feed.appendChild(el);
  });
}
// Funzione like
function likePost(id, element) {
  const post = posts.find(p => p.id === id);
  post.likes++;
  element.classList.add("liked");
  element.innerHTML = "❤ " + post.likes;
}
</script>
</body>
</html>
