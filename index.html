<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>SportApp</title>

<!-- Font moderno -->
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

<style>
body {
font-family: 'Roboto', sans-serif;
max-width: 600px;
margin: auto;
background-color: #f0f2f5;
}

/* Header */
header {
display: flex;
align-items: center;
justify-content: space-between;
background-color: #1e90ff;
color: white;
padding: 15px 20px;
border-radius: 10px 10px 0 0;
box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

header h2 { margin: 0; }

/* Feed post */
.post {
border: 1px solid #ccc;
border-radius: 10px;
box-shadow: 0 2px 5px rgba(0,0,0,0.1);
padding: 15px;
margin: 15px 0;
background-color: #fff;
}

.post img {
width: 100%;
border-radius: 10px;
margin-top: 10px;
}

.like { color: red; cursor: pointer; }

/* Form per nuovo post */
#new-post {
display: flex;
flex-direction: column;
margin: 15px 0;
}

#new-post input, #new-post textarea {
margin: 5px 0;
padding: 10px;
border-radius: 5px;
border: 1px solid #ccc;
}

#new-post button {
padding: 10px;
border-radius: 5px;
border: none;
background-color: #1e90ff;
color: white;
font-weight: bold;
cursor: pointer;
}

#new-post button:hover { background-color: #187bcd; }
</style>
</head>
<body>

<!-- Header -->
<header>
<h2>SportApp</h2>
<img src="https://via.placeholder.com/40" alt="Logo">
</header>

<!-- Form per nuovo post finto -->
<div id="new-post">
<input type="text" id="user" placeholder="Nome">
<textarea id="message" placeholder="Cosa hai fatto oggi?"></textarea>
<input type="text" id="image" placeholder="URL immagine (opzionale)">
<button onclick="addPost()">Pubblica</
button>

</div>

<!-- Feed -->
<div id="feed">
<div class="post">
<p><strong>Mario</strong> ha corso 5 km oggi 🏃‍♂️</p>
<img src="https://via.placeholder.com/500x200?text=Corsa" alt="Corsa">
<span class="like">❤️ Like</span>
</div>

<div class="post">
<p><strong>Luca</strong> ha fatto 50 flessioni 💪</p>
<img src="https://via.placeholder.com/500x200?text=Flessioni" alt="Flessioni">
<span class="like">❤️ Like</span>
</div>

<div class="post">
<p><strong>Anna</strong> ha fatto 10 km in bici 🚴‍♀️</p>
<img src="https://via.placeholder.com/500x200?text=Bici" alt="Bici">
<span class="like">❤️ Like</span>
</div>
</div>

<!-- JavaScript -->
<script>
// Cuori cliccabili
const hearts = document.querySelectorAll('.like');
hearts.forEach(h => {
h.addEventListener('click', () => {
h.style.color = (h.style.color === 'red') ? 'gray' : 'red';
});
});

// Aggiungi nuovo post finto
function addPost() {
const user = document.getElementById('user').value;
const message = document.getElementById('message').value;
const image = document.getElementById('image').value;

if(!user || !message) {
alert("Inserisci nome e messaggio!");
return;
}

const feed = document.getElementById('feed');

const postDiv = document.createElement('div');
postDiv.className = 'post';

let html = `<p><strong>${user}</strong> ${message}</p>`;
if(image) html += `<img src="${image}" alt="Post image">`;
html += `<span class="like">❤️ Like</span>`;

postDiv.innerHTML = html;
feed.prepend(postDiv);

// Cuore cliccabile nuovo post
postDiv.querySelector('.like').addEventListener('click', () => {
const heart = postDiv.querySelector('.like');
heart.style.color = (heart.style.color === 'red') ? 'gray' : 'red';
});

// Reset form
document.getElementById('user').value = '';
document.getElementById('message').value = '';
document.getElementById('image').value = '';
}
</script>

</body>
</html>
